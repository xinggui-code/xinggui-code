<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 GitHub 主页</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 0.5em;
    }
    p {
      font-size: 1.2em;
      line-height: 1.6;
    }
    /* 浮窗容器，保证不遮挡内容 */
    #maxkb-widget {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>👋 你好，我是 [你的名字]</h1>
    <p>欢迎来到我的 GitHub 主页！我专注于 AI 应用开发与 RAG 技术落地。</p>
    <p>右下角的智能助手已经为你开启，随时可以和我交流～</p>
  </div>

  <!-- MaxKB 浮窗脚本 -->
  <div id="maxkb-widget">
    <script
      async
      defer
      src="http://192.168.245.130:8080/chat/api/embed?protocol=http&host=192.168.245.130:8080&token=2ca8a7efd9991e2a">
    </script>
  </div>
</body>
</html>
